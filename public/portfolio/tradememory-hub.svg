<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600">
  <rect width="960" height="600" fill="#0b1120" rx="8"/>
  <!-- Terminal header -->
  <rect width="960" height="32" fill="#080d18" rx="8"/>
